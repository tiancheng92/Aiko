<h2>对话窗口的布局方式</h2>
<p class="subtitle">点击悬浮球后，聊天界面如何展示？</p>

<div class="cards">
  <div class="card" data-choice="bubble" onclick="toggleSelect(this)">
    <div class="card-image" style="height:140px;background:#1a1a2e;border-radius:8px;padding:12px;display:flex;flex-direction:column;justify-content:flex-end;gap:6px;">
      <div style="display:flex;justify-content:flex-end;">
        <div style="background:#4f46e5;color:#fff;padding:6px 12px;border-radius:12px 12px 2px 12px;font-size:12px;">你好！</div>
      </div>
      <div style="display:flex;justify-content:flex-start;">
        <div style="background:#374151;color:#e5e7eb;padding:6px 12px;border-radius:12px 12px 12px 2px;font-size:12px;">你好～有什么能帮你的？</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
        <div style="flex:1;background:#374151;border-radius:8px;height:24px;"></div>
        <div style="background:#4f46e5;border-radius:6px;padding:4px 10px;font-size:11px;color:#fff;">发送</div>
      </div>
    </div>
    <div class="card-body">
      <h3>A — 气泡弹窗</h3>
      <p>点击悬浮球后弹出一个紧贴屏幕角落的小窗，类似 IM 聊天气泡，轻量无遮挡</p>
    </div>
  </div>

  <div class="card" data-choice="panel" onclick="toggleSelect(this)">
    <div class="card-image" style="height:140px;background:#1a1a2e;border-radius:8px;padding:0;overflow:hidden;display:flex;flex-direction:column;">
      <div style="background:#111827;padding:8px 12px;font-size:11px;color:#9ca3af;border-bottom:1px solid #374151;">🐾 桌宠助手</div>
      <div style="flex:1;padding:8px;display:flex;flex-direction:column;gap:4px;">
        <div style="display:flex;justify-content:flex-end;">
          <div style="background:#4f46e5;color:#fff;padding:4px 10px;border-radius:8px;font-size:11px;">帮我写个脚本</div>
        </div>
        <div style="display:flex;justify-content:flex-start;">
          <div style="background:#374151;color:#e5e7eb;padding:4px 10px;border-radius:8px;font-size:11px;">好的，以下是...</div>
        </div>
      </div>
      <div style="background:#111827;padding:6px;display:flex;gap:4px;border-top:1px solid #374151;">
        <div style="flex:1;background:#374151;border-radius:6px;height:20px;"></div>
        <div style="background:#4f46e5;border-radius:4px;padding:2px 8px;font-size:10px;color:#fff;">↑</div>
      </div>
    </div>
    <div class="card-body">
      <h3>B — 侧边浮层面板</h3>
      <p>从屏幕边缘滑入一个固定宽度面板，像侧边栏，有标题栏和完整聊天历史</p>
    </div>
  </div>

  <div class="card" data-choice="window" onclick="toggleSelect(this)">
    <div class="card-image" style="height:140px;background:#1a1a2e;border-radius:8px;padding:0;overflow:hidden;display:flex;flex-direction:column;">
      <div style="background:#111827;padding:6px 12px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #374151;">
        <div style="width:8px;height:8px;border-radius:50%;background:#ef4444;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#f59e0b;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:#22c55e;"></div>
        <span style="font-size:11px;color:#9ca3af;margin-left:4px;">桌宠助手</span>
      </div>
      <div style="flex:1;padding:8px;overflow:hidden;">
        <div style="color:#9ca3af;font-size:11px;text-align:center;margin-top:20px;">可拖拽 · 可调整大小</div>
      </div>
      <div style="background:#111827;padding:6px;border-top:1px solid #374151;display:flex;gap:4px;">
        <div style="flex:1;background:#374151;border-radius:6px;height:20px;"></div>
        <div style="background:#4f46e5;border-radius:4px;padding:2px 8px;font-size:10px;color:#fff;">↑</div>
      </div>
    </div>
    <div class="card-body">
      <h3>C — 独立原生窗口</h3>
      <p>弹出一个标准的 macOS 窗口，带标题栏、可拖拽调整大小，体验最完整</p>
    </div>
  </div>
</div>
