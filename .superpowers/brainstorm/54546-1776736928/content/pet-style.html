<h2>桌宠的视觉风格</h2>
<p class="subtitle">你想要什么样的宠物形象？</p>

<div class="cards">
  <div class="card" data-choice="pixel" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;height:120px;background:#1a1a2e;border-radius:8px;font-size:48px;letter-spacing:4px;">
      🐱
    </div>
    <div class="card-body">
      <h3>A — 像素/卡通猫咪</h3>
      <p>经典 pixel art 风格，小巧可爱的猫咪形象，支持简单动画帧（idle、说话、思考状态）</p>
    </div>
  </div>

  <div class="card" data-choice="chibi" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;height:120px;background:#1a1a2e;border-radius:8px;font-size:48px;letter-spacing:4px;">
      🐶
    </div>
    <div class="card-body">
      <h3>B — Q 版小狗/小动物</h3>
      <p>圆润 Q 版风格，可爱小狗形象，动画更丰富（摇尾巴、眨眼等）</p>
    </div>
  </div>

  <div class="card" data-choice="custom" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;height:120px;background:#1a1a2e;border-radius:8px;font-size:48px;letter-spacing:4px;">
      🦊
    </div>
    <div class="card-body">
      <h3>C — 自定义精灵/可替换</h3>
      <p>支持加载外部图片/GIF，用户自行替换宠物形象，系统不绑定特定角色</p>
    </div>
  </div>

  <div class="card" data-choice="simple" onclick="toggleSelect(this)">
    <div class="card-image" style="display:flex;align-items:center;justify-content:center;height:120px;background:#1a1a2e;border-radius:8px;font-size:36px;letter-spacing:2px;">
      ⬜
    </div>
    <div class="card-body">
      <h3>D — 简约方块/悬浮球</h3>
      <p>极简风格，仅一个小图标或悬浮球，重点在对话功能而非角色外观</p>
    </div>
  </div>
</div>
