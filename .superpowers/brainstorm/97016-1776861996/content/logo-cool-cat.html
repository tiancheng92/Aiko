<h2>酷风猫娘 · Logo 方向</h2>

<div class="cards">

        <circle cx="55" cy="35" r="4" fill="#333"/>

        <ellipse cx="55" cy="72" rx="28" ry="30" fill="#f5deb3"/>

        <circle cx="55" cy="102" r="2" fill="#4facfe"/>

        <ellipse cx="42" cy="70" rx="8" ry="7" fill="white"/>
        <ellipse cx="68" cy="70" rx="8" ry="7" fill="white"/>
        <!-- Iris - blue -->
        <circle cx="42" cy="71" r="5.5" fill="#4facfe"/>
        <circle cx="68" cy="71" r="5.5" fill="#4facfe"/>
        <circle cx="42" cy="71" r="3" fill="#1a6fdb"/>
        <circle cx="68" cy="71" r="3" fill="#1a6fdb"/>
        <!-- Pupil shine -->
        <circle cx="43.5" cy="69.5" r="1.5" fill="white"/>
        <circle cx="69.5" cy="69.5" r="1.5" fill="white"/>

        <path d="M34,66 Q42,62 50,66" stroke="#1a1a1a" stroke-width="2" fill="none"/>
        <path d="M60,66 Q68,62 76,66" stroke="#1a1a1a" stroke-width="2" fill="none"/>

        <!-- Cool slight smile -->
        <path d="M49,88 Q55,92 61,88" stroke="#c4a882" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Body - jacket suggestion -->
        <rect x="30" y="108" width="50" height="40" rx="6" fill="#1a1a1a" opacity="0.9"/>
        <rect x="30" y="108" width="22" height="40" rx="0" fill="#222"/>
        <line x1="52" y1="108" x2="52" y2="148" stroke="#00f2fe" stroke-width="1" opacity="0.6"/>

    </div>
    <div class="card-body">

      <p>半身立绘风格图标，金发 + 蓝眼 + 贝雷帽 + 黑夹克，直接致敬角色</p>

  <div class="card" data-choice="minimal-cool" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#0d0d0d; height:200px; border-radius:12px; display:flex; align-items:center; justify-content:center;">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <defs>
          <linearGradient id="blueGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4facfe"/>
            <stop offset="100%" stop-color="#00f2fe"/>
          </linearGradient>
        </defs>
        <!-- Minimal cat silhouette - flat design, cool colors -->
        <!-- Ears sharp -->
        <polygon points="22,44 10,10 40,36" fill="#4facfe"/>
        <polygon points="24,42 14,16 36,34" fill="#0d3a6e"/>
        <polygon points="98,44 110,10 80,36" fill="#4facfe"/>
        <polygon points="96,42 106,16 84,34" fill="#0d3a6e"/>
        <!-- Face circle -->
        <circle cx="60" cy="70" r="36" fill="#4facfe"/>
        <circle cx="60" cy="70" r="33" fill="#1565c0"/>
        <!-- Eyes - just two horizontal glowing slits -->
        <rect x="35" y="62" width="18" height="5" rx="2.5" fill="#00f2fe"/>
        <rect x="67" y="62" width="18" height="5" rx="2.5" fill="#00f2fe"/>

        <rect x="35" y="62" width="18" height="5" rx="2.5" fill="#00f2fe" opacity="0.4" transform="translate(0,3)"/>
        <rect x="67" y="62" width="18" height="5" rx="2.5" fill="#00f2fe" opacity="0.4" transform="translate(0,3)"/>

        <circle cx="60" cy="76" r="2.5" fill="#4facfe"/>
        <!-- Flat line mouth -->
        <rect x="50" y="84" width="20" height="2.5" rx="1.25" fill="#4facfe" opacity="0.6"/>
        <!-- X mark on cheek like char -->
        <text x="82" y="80" fill="rgba(79,172,254,0.5)" font-size="10" font-weight="bold">×</text>
      </svg>
    </div>
    <div class="card-body">
      <h3>C · 极简猫脸</h3>
      <p>纯色几何猫脸 + 发光竖瞳，×标记装饰，街头感强，高度抽象</p>
