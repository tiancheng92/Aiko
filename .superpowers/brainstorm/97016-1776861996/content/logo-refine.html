<h2>对话框宠物 · 细化方向</h2>
<p class="subtitle">同一概念，三种不同的表达风格</p>

<div class="cards">
  <div class="card" data-choice="round-cute" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); height: 180px; border-radius: 12px; display:flex; align-items:center; justify-content:center;">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <!-- Glow -->
        <ellipse cx="60" cy="65" rx="42" ry="38" fill="rgba(255,255,255,0.15)"/>
        <!-- Main bubble body - very round -->
        <rect x="14" y="18" width="92" height="68" rx="34" fill="white"/>
        <!-- Tail -->
        <path d="M32 86 L22 106 L52 90Z" fill="white"/>
        <!-- Left ear -->
        <ellipse cx="28" cy="18" rx="10" ry="13" fill="white" transform="rotate(-15 28 18)"/>
        <ellipse cx="28" cy="18" rx="6" ry="9" fill="#7dd6fc" transform="rotate(-15 28 18)"/>
        <!-- Right ear -->
        <ellipse cx="92" cy="18" rx="10" ry="13" fill="white" transform="rotate(15 92 18)"/>
        <ellipse cx="92" cy="18" rx="6" ry="9" fill="#7dd6fc" transform="rotate(15 92 18)"/>
        <!-- Eyes -->
        <circle cx="44" cy="50" r="8" fill="#4facfe"/>
        <circle cx="76" cy="50" r="8" fill="#4facfe"/>
        <circle cx="46" cy="48" r="3.5" fill="#1060c0"/>
        <circle cx="78" cy="48" r="3.5" fill="#1060c0"/>
        <circle cx="47" cy="47" r="1.5" fill="white"/>
        <circle cx="79" cy="47" r="1.5" fill="white"/>
        <!-- Smile -->
        <path d="M50 64 Q60 72 70 64" stroke="#4facfe" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Nose -->
        <ellipse cx="60" cy="61" rx="3" ry="2" fill="#7dd6fc"/>
        <!-- AI spark -->
        <circle cx="92" cy="30" r="9" fill="#00f2fe"/>
        <text x="92" y="34" text-anchor="middle" fill="white" font-size="10" font-weight="bold">AI</text>
      </svg>
    </div>
    <div class="card-body">
      <h3>A · 圆润可爱</h3>
      <p>超圆气泡 + 猫耳，右上角 AI 徽章，萌感拉满，亲和力强</p>
    </div>
  </div>

  <div class="card" data-choice="modern-flat" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); height: 180px; border-radius: 12px; display:flex; align-items:center; justify-content:center;">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <!-- Shadow layer -->
        <rect x="16" y="24" width="88" height="62" rx="18" fill="rgba(0,0,0,0.1)"/>
        <!-- Main bubble - modern rounded rect -->
        <rect x="14" y="20" width="88" height="62" rx="18" fill="white"/>
        <!-- Tail - geometric -->
        <path d="M34 82 L28 100 L50 84Z" fill="white"/>
        <!-- Left ear - geometric triangle-ish -->
        <path d="M22 24 L18 8 L36 20Z" fill="white"/>
        <path d="M23 22 L20 10 L33 20Z" fill="#b3e5fc"/>
        <!-- Right ear -->
        <path d="M98 24 L102 8 L84 20Z" fill="white"/>
        <path d="M97 22 L100 10 L87 20Z" fill="#b3e5fc"/>
        <!-- Minimalist face -->
        <!-- Eyes - arc style -->
        <path d="M38 46 Q44 40 50 46" stroke="#4facfe" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M70 46 Q76 40 82 46" stroke="#4facfe" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Blush -->
        <ellipse cx="36" cy="56" rx="6" ry="4" fill="#ffd6e0" opacity="0.7"/>
        <ellipse cx="84" cy="56" rx="6" ry="4" fill="#ffd6e0" opacity="0.7"/>
        <!-- Mouth -->
        <path d="M52 60 Q60 66 68 60" stroke="#4facfe" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Circuit line decoration -->
        <line x1="14" y1="35" x2="6" y2="35" stroke="rgba(79,172,254,0.4)" stroke-width="1.5"/>
        <circle cx="5" cy="35" r="2" fill="rgba(79,172,254,0.4)"/>
        <line x1="102" y1="55" x2="112" y2="55" stroke="rgba(0,242,254,0.4)" stroke-width="1.5"/>
        <circle cx="113" cy="55" r="2" fill="rgba(0,242,254,0.4)"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>B · 现代极简</h3>
      <p>几何猫耳 + 弧线眼睛，边缘电路装饰，科技感与萌感平衡</p>
    </div>
  </div>

  <div class="card" data-choice="glow-tech" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #0f0c29 0%, #1a1a4e 50%, #0f2b6e 100%); height: 180px; border-radius: 12px; display:flex; align-items:center; justify-content:center;">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <!-- Glow effects -->
        <defs>
          <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#00f2fe" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <ellipse cx="60" cy="55" rx="50" ry="45" fill="url(#glowGrad)"/>
        <!-- Main bubble - glowing outline -->
        <rect x="14" y="20" width="88" height="62" rx="18" fill="rgba(255,255,255,0.08)" stroke="#00f2fe" stroke-width="2"/>
        <!-- Inner glow border -->
        <rect x="16" y="22" width="84" height="58" rx="16" fill="none" stroke="rgba(79,172,254,0.3)" stroke-width="1"/>
        <!-- Tail -->
        <path d="M34 82 L28 100 L50 84Z" fill="rgba(255,255,255,0.08)" stroke="#00f2fe" stroke-width="2"/>
        <!-- Left ear -->
        <path d="M22 24 L16 6 L36 18Z" fill="rgba(255,255,255,0.08)" stroke="#00f2fe" stroke-width="2"/>
        <!-- Right ear -->
        <path d="M98 24 L104 6 L84 18Z" fill="rgba(255,255,255,0.08)" stroke="#00f2fe" stroke-width="2"/>
        <!-- Glowing eyes -->
        <circle cx="44" cy="50" r="7" fill="rgba(0,242,254,0.15)" stroke="#00f2fe" stroke-width="1.5"/>
        <circle cx="76" cy="50" r="7" fill="rgba(0,242,254,0.15)" stroke="#00f2fe" stroke-width="1.5"/>
        <circle cx="44" cy="50" r="3" fill="#00f2fe"/>
        <circle cx="76" cy="50" r="3" fill="#00f2fe"/>
        <circle cx="45" cy="49" r="1.2" fill="white"/>
        <circle cx="77" cy="49" r="1.2" fill="white"/>
        <!-- Smile glowing -->
        <path d="M50 64 Q60 71 70 64" stroke="#4facfe" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Scanning line -->
        <line x1="20" y1="50" x2="96" y2="50" stroke="rgba(0,242,254,0.15)" stroke-width="1"/>
        <!-- Corner dots -->
        <circle cx="20" cy="26" r="2" fill="#00f2fe" opacity="0.6"/>
        <circle cx="96" cy="26" r="2" fill="#00f2fe" opacity="0.6"/>
        <circle cx="20" cy="76" r="2" fill="#00f2fe" opacity="0.6"/>
        <circle cx="96" cy="76" r="2" fill="#00f2fe" opacity="0.6"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>C · 暗色赛博</h3>
      <p>深色背景 + 霓虹描边，发光眼睛，赛博朋克 AI 宠物风格</p>
    </div>
  </div>
</div>
