<h2>去幼稚化 · 成熟版本</h2>
<p class="subtitle">保留对话框宠物概念，提升设计感与专业度</p>

<div class="cards">

        <!-- Tail - sharp -->
        <polygon points="24,90 16,108 44,90" fill="rgba(255,255,255,0.92)"/>
        <!-- Eyes - simple dots, cool expression -->
        <rect x="34" y="48" width="14" height="4" rx="2" fill="#2b8fd4"/>
        <rect x="72" y="48" width="14" height="4" rx="2" fill="#2b8fd4"/>

        <rect x="50" y="66" width="20" height="3" rx="1.5" fill="#4facfe" opacity="0.6"/>

        <line x1="10" y1="44" x2="0" y2="44" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>
        <circle cx="0" cy="44" r="2" fill="rgba(79,172,254,0.5)"/>
        <line x1="0" y1="44" x2="0" y2="56" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>
        <line x1="0" y1="56" x2="6" y2="56" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>
        <line x1="110" y1="50" x2="120" y2="50" stroke="rgba(0,242,254,0.5)" stroke-width="1.5"/>
        <circle cx="120" cy="50" r="2" fill="rgba(0,242,254,0.5)"/>

      <p>锐利三角耳 + 矩形眼 + 平直嘴，冷静克制，设计感强</p>
    </div>
  </div>

  <div class="card" data-choice="line-art" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(145deg,#0d1b3e 0%,#0a2a5e 100%); height:180px; border-radius:12px; display:flex; align-items:center; justify-content:center;">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <defs>
          <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4facfe"/>
            <stop offset="100%" stop-color="#00f2fe"/>
          </linearGradient>
        </defs>
        <!-- Ears outline only -->
        <polygon points="18,32 12,6 34,24" fill="rgba(79,172,254,0.08)" stroke="url(#lineGrad)" stroke-width="1.8"/>
        <polygon points="102,32 108,6 86,24" fill="rgba(79,172,254,0.08)" stroke="url(#lineGrad)" stroke-width="1.8"/>
        <!-- Bubble outline -->
        <rect x="10" y="26" width="100" height="64" rx="14" fill="rgba(79,172,254,0.07)" stroke="url(#lineGrad)" stroke-width="1.8"/>
        <!-- Tail -->
        <polygon points="24,90 16,108 44,90" fill="rgba(79,172,254,0.07)" stroke="url(#lineGrad)" stroke-width="1.8"/>

        <line x1="33" y1="50" x2="50" y2="50" stroke="#4facfe" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="70" y1="50" x2="87" y2="50" stroke="#4facfe" stroke-width="2.5" stroke-linecap="round"/>

        <line x1="50" y1="68" x2="70" y2="68" stroke="#4facfe" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

        <line x1="25" y1="40" x2="95" y2="40" stroke="rgba(79,172,254,0.12)" stroke-width="1"/>
        <line x1="25" y1="78" x2="95" y2="78" stroke="rgba(79,172,254,0.12)" stroke-width="1"/>
        <line x1="35" y1="32" x2="35" y2="88" stroke="rgba(79,172,254,0.08)" stroke-width="1"/>
        <line x1="85" y1="32" x2="85" y2="88" stroke="rgba(79,172,254,0.08)" stroke-width="1"/>
        <!-- Corner nodes -->
        <circle cx="10" cy="26" r="3" fill="#4facfe" opacity="0.8"/>
        <circle cx="110" cy="26" r="3" fill="#4facfe" opacity="0.8"/>
        <circle cx="10" cy="90" r="3" fill="#00f2fe" opacity="0.8"/>
        <circle cx="110" cy="90" r="3" fill="#00f2fe" opacity="0.8"/>
      </svg>
    </div>
    <div class="card-body">
      <h3>B · 线框 + 深底</h3>
      <p>深色背景 + 渐变描边，无填充线框风格，科技感最强，成熟大气</p>
    </div>
  </div>

      <h3>C · 简洁现代</h3>
      <p>去掉腮红，保留弧线眼但加粗，极简嘴 + 少量电路角标，克制而精致</p>

</div>
